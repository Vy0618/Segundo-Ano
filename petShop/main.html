  <link href="./srcTailwind/output.css" rel="stylesheet">
    <style>
        .ascii-art {
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 16px;
            line-height: 1.2;
            white-space: pre;
            color: #000000;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
        }

        /* Efeito de scanline CRT */
        .ascii-art {
            position: relative;
            overflow: hidden;
        }

        .ascii-art::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    transparent 50%,
                    rgba(59, 255, 75, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(100%);
            }
        }
    </style>
</head>
