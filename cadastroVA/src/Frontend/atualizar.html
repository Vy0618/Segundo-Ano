<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<header>
    <h3> Página Atualizar</h3>
    <div class="headerRight">
        <a href="usuarios.html">
            <h3> Página Usuários</h3>
        </a>
        <div class="headerRight" id="userInfo"> </div>

    </div>
</header>

<body>
    <div class=superbox>

        <div class=genericContainer>
            <h2> Atualizar</h2>
            <br>
            <form id="updateForm">
                <input placeholder="Nome" id="nome" type="text">
                <input placeholder="E-mail" id="email" type="text">
                <input placeholder="Senha" id="senha" type="text">
                <input placeholder="Perfil" id="perfil" type="text">
                <input placeholder="Endereco" id="endereco" type="text">
                <input placeholder="Bairro" id="bairro" type="text">
                <input placeholder="Complemento" id="complemento" type="text">
                <input placeholder="Cep" id="cep" type="text">
                <input placeholder="Cidade" id="cidade" type="text">
                <input placeholder="Estado" id="estado" type="text">
                <button id="submit" type="submit">Atualizar</button>

            </form>
        </div>
    </div>

    <footer> </footer>

</body>
<script src="js/atualizar.js"></script>
<script src="js/usuarioLogado.js"></script>

</html>
